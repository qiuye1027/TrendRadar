app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "always_on"

# ==========================
# 开启可用平台（无500、不报错）
# ==========================
platforms:
  enabled: true
  sources:
    - id: "weibo"
      name: "微博"
    - id: "toutiao"
      name: "今日头条"
    - id: "zhihu"
      name: "知乎"
    - id: "baidu"
      name: "百度热搜"

# ==========================
# 关闭报错的 RSS
# ==========================
rss:
  enabled: false
  feeds: []

# ==========================
# 报告模式（必须用 daily）
# ==========================
report:
  mode: "daily"
  title: "一人食·微醺 热点选题"
  display_mode: "keyword"
  content_length: 120
  max_news_per_keyword: 0

# ==========================
# 关键词筛选（你的赛道）
# ==========================
filter:
  method: "keyword"

# ==========================
# 显示配置（全开）
# ==========================
display:
  region_order:
    - hotlist
  regions:
    hotlist: true
    new_items: false
    rss: false
    standalone: false
    ai_analysis: false

# ==========================
# 企业微信推送（你的机器人）
# ==========================
notification:
  enabled: true
  channels:
    wework:
      webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=c069a2a3-f57f-4a3c-aa90-1fb9b71a7a57"
      msg_type: "text"

# ==========================
# 关闭 AI 避免报错
# ==========================
ai:
  api_key: ""
ai_analysis:
  enabled: false
ai_translation:
  enabled: false

storage:
  backend: "local"
  formats:
    sqlite: true
    txt: false
    html: false