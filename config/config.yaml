app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "always_on"

# 彻底关闭所有热搜
platforms:
  enabled: false
  sources: []

# RSS 只抓一人食/微醺
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "xhs_yirenshi"
      name: "小红书一人食"
      url: "https://rsshub.app/xiaohongshu/search/keyword/一人食"
    - id: "xhs_weixun"
      name: "小红书微醺"
      url: "https://rsshub.app/xiaohongshu/search/keyword/微醺"
    - id: "xhs_wancan"
      name: "小红书晚餐"
      url: "https://rsshub.app/xiaohongshu/search/keyword/一人食晚餐"
    - id: "xhs_xiaozhuo"
      name: "小红书小酌"
      url: "https://rsshub.app/xiaohongshu/search/keyword/小酌"

report:
  mode: "incremental"
  title: "一人食·微醺 热点"
  display_mode: "keyword"
  content_length: 120

filter:
  method: "keyword"

display:
  region_order:
    - rss
  regions:
    hotlist: false
    new_items: false
    rss: true
    standalone: false
    ai_analysis: false

# 企业微信推送（你自己的机器人）
notification:
  enabled: true
  channels:
    wework:
      webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=c069a2a3-f57f-4a3c-aa90-1fb9b71a7a57"
      msg_type: "text"

# 关闭所有AI
ai:
  api_key: ""
ai_analysis:
  enabled: false
ai_translation:
  enabled: false

storage:
  backend: "local"
  formats:
    sqlite: true
    txt: false
    html: false